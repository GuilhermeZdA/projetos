<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>
<body>
    <main>
        <div id="imagem"></div>
        <section>
            <div id="formulario">
                <h1>Login <span class="material-symbols-outlined">lock</span></h1>
                <form action="entrar.php" method="post" autocomplete="on">
                    <div class="caixa">
                        <span class="material-symbols-outlined">person</span>
                        <label for="imail"></label>
                        <input type="email" name="email" id="imail" required autocomplete="email" maxlength="30" placeholder="E-mail">
                    </div>
                    <div class="caixa">
                        <span class="material-symbols-outlined">vpn_key</span>
                        <label for="isenha"></label>
                        <input type="password" name="senha" id="isenha" required autocomplete="current-password" minlength="8" maxlength="30" placeholder="Senha">
                    </div>
                    <div>
                        <input type="submit" value="Entrar">
                        <a href="#">Esqueci a senha</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
